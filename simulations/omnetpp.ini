[General]
sim-time-limit = 150s
repeat = 10
seed-set = ${repetition}
ned-path = ../src;.
output-vector-file = ../results/${configname}-${runnumber}.vec
output-scalar-file = ../results/${configname}-${runnumber}.sca

**.sensor.maxMessages = 1000
**.sensor.baseTemperature = ${temp=28,32,36}
**.sensor.payloadSize = 32
**.attacker.forgedTemperature = 18
**.metrics.resultDir = "results"

**.ac.authEnabled = ${auth=true,false}
**.ac.nonceCheckEnabled = ${nonce=true,false}
**.ac.timestampCheckEnabled = ${timecheck=true,false}
**.ac.sequenceCheckEnabled = ${seqcheck=true,false}

[Config WPAN-ChaCha]
network = WPANScenario
*.algorithm = "ChaCha20-Poly1305"
*.sensor.algorithm = "ChaCha20-Poly1305"
*.ac.algorithm = "ChaCha20-Poly1305"

[Config WPAN-ASCON]
network = WPANScenario
*.algorithm = "ASCON-128"
*.sensor.algorithm = "ASCON-128"
*.ac.algorithm = "ASCON-128"

[Config WPAN-SIMON]
network = WPANScenario
*.algorithm = "SIMON"
*.sensor.algorithm = "SIMON"
*.ac.algorithm = "SIMON"

[Config BLE-ChaCha]
network = BLEScenario
*.algorithm = "ChaCha20-Poly1305"
*.sensor.algorithm = "ChaCha20-Poly1305"
*.ac.algorithm = "ChaCha20-Poly1305"

[Config BLE-ASCON]
network = BLEScenario
*.algorithm = "ASCON-128"
*.sensor.algorithm = "ASCON-128"
*.ac.algorithm = "ASCON-128"

[Config BLE-SIMON]
network = BLEScenario
*.algorithm = "SIMON"
*.sensor.algorithm = "SIMON"
*.ac.algorithm = "SIMON"
