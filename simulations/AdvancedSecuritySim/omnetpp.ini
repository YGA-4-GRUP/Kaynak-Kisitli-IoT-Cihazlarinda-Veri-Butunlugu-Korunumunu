[General]
network = AdvancedSecurityNetwork
ned-path = .:/home/uzai/yga/omnet/inet/src
sim-time-limit = 100s

output-scalar-file = results/${configname}-${runnumber}.sca
output-vector-file = results/${configname}-${runnumber}.vec

# --- IEEE 802.11n Wi-Fi WLAN Yapilandirmasi ---
*.configurator.typename = "Ipv4NetworkConfigurator"
**.wlan[*].typename = "Ieee80211Interface"
**.wlan[*].mac.typename = "Ieee80211Mac"
**.wlan[*].radio.typename = "Ieee80211ScalarRadio"
**.wlan[*].mgmt.typename = "Ieee80211MgmtAdhoc"
**.wlan[*].agent.typename = ""

# Iletisim menzili vb fiziksel durumlar (Standart OGUZ Sim.)
**.radioMedium.backgroundNoise.power = -90dBm

# --- UYGULAMA KATMANI (Bizim SmartNode ve MitM Objelerimiz) ---
*.sensor.numApps = 1
*.sensor.app[0].typename = "SmartSensorApp"
*.sensor.app[0].localPort = 4000
*.sensor.app[0].destPort = 5000
*.sensor.app[0].destAddress = "mitm" 
*.sensor.app[0].sendInterval = 1s
*.sensor.app[0].senseDelay = 5ms
*.sensor.app[0].isActuator = false

*.mitm.numApps = 1
*.mitm.app[0].typename = "MitMApp"
*.mitm.app[0].localPort = 5000
*.mitm.app[0].destPort = 6000
*.mitm.app[0].destAddress = "actuator"

*.actuator.numApps = 1
*.actuator.app[0].typename = "SmartSensorApp"
*.actuator.app[0].localPort = 6000
*.actuator.app[0].destPort = 0
*.actuator.app[0].destAddress = ""
*.actuator.app[0].isActuator = true
*.actuator.app[0].actuateDelay = 20ms

# ================================
# SENARYOLAR VE ALGORITMALAR
# ================================

[Config Sifresiz_Zafiyet_Testi]
description = "Sifreleme yok. MitM saldirisi devreye giriyor (Etkilerini izliyoruz)."
*.sensor.app[0].cryptoType = "None"
*.sensor.app[0].packetSize = 50B
*.sensor.app[0].cryptoCpuDelay = 0ms

*.actuator.app[0].cryptoType = "None"
*.actuator.app[0].cryptoCpuDelay = 0ms

[Config RSA]
description = "RSA-2048 Sifrelemesi (Gecikme cok, Manipulasyon engellendi)"
*.sensor.app[0].cryptoType = "RSA"
*.sensor.app[0].packetSize = 256B
*.sensor.app[0].cryptoCpuDelay = 50ms # Ağır CPU yükü (Oguz'daki 5ms udp gecikmesini gercek CPU'da uzatarak task drop yaratiyoruz)

*.actuator.app[0].cryptoType = "RSA"
*.actuator.app[0].cryptoCpuDelay = 50ms

[Config ECC]
description = "ECC Sifrelemesi (Orta Gecikme, Guvenli)"
*.sensor.app[0].cryptoType = "ECC"
*.sensor.app[0].packetSize = 165B
*.sensor.app[0].cryptoCpuDelay = 20ms

*.actuator.app[0].cryptoType = "ECC"
*.actuator.app[0].cryptoCpuDelay = 20ms

[Config ML-KEM]
description = "ML-KEM Post-Kuantum Sifrelemesi (Islem hizli ama paket boyutu yuksek)"
*.sensor.app[0].cryptoType = "ML-KEM"
*.sensor.app[0].packetSize = 1188B
*.sensor.app[0].cryptoCpuDelay = 5ms

*.actuator.app[0].cryptoType = "ML-KEM"
*.actuator.app[0].cryptoCpuDelay = 5ms
