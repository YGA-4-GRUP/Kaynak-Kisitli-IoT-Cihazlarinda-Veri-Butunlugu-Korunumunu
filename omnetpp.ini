[General]
network = KriptoAgi
sim-time-limit=100s

*.sensor.numApps = 1
*.sensor.app[0].typename = "UdpBasicApp"
*.sensor.app[0].destAddresses = "gateway"
*.sensor.app[0].destPort = 5000
*.sensor.app[0].sendInterval = 1s

*.gateway.numApps = 1
*.gateway.app[0].typename = "UdpSink"
*.gateway.app[0].localPort = 5000

*.configurator.typename = "Ipv4NetworkConfigurator"
**.wlan[*].mgmt.typename = "Ieee80211MgmtAdhoc"
**.wlan[*].agent.typename = ""

[Config RSA]
description = "RSA-2048 Simulasyonu"
*.sensor.app[0].messageLength = 256B
*.sensor.udp.procDelay = 5.0ms

[Config ECC]
description = "ECC Simulasyonu"
*.sensor.app[0].messageLength = 165B
*.sensor.udp.procDelay = 2.0ms

[Config ML-KEM]
description = "ML-KEM Post-Kuantum Simulasyonu"
*.sensor.app[0].messageLength = 1188B
*.sensor.udp.procDelay = 0.5ms