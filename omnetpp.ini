[General]
network = KriptoAgi
sim-time-limit=100s

*.sensor.numApps = 1
*.sensor.app[0].typename = "UdpBasicApp"
*.sensor.app[0].destAddresses = "gateway"
*.sensor.app[0].destPort = 5000
*.sensor.app[0].sendInterval = 1s

*.gateway.numApps = 1
*.gateway.app[0].typename = "UdpSink"
*.gateway.app[0].localPort = 5000

*.configurator.typename = "Ipv4NetworkConfigurator"
**.wlan[*].mgmt.typename = "Ieee80211MgmtAdhoc"
**.wlan[*].agent.typename = ""

# -----------------------------------------------------------------
# WPAN: PRESENT, SPECK, CLEFIA, BLE
# -----------------------------------------------------------------
[Config PRESENT]
description = "WPAN - PRESENT"
*.sensor.app[0].messageLength = 108B
*.sensor.udp.procDelay = 0.090ms

[Config SPECK]
description = "WPAN - SPECK"
*.sensor.app[0].messageLength = 108B
*.sensor.udp.procDelay = 0.080ms

[Config CLEFIA]
description = "WPAN - CLEFIA"
*.sensor.app[0].messageLength = 116B
*.sensor.udp.procDelay = 0.130ms

[Config BLE]
description = "WPAN - BLE profil"
*.sensor.app[0].messageLength = 112B
*.sensor.udp.procDelay = 0.120ms

# -----------------------------------------------------------------
# 6LoWPAN: SPECK, ECC, ChaCha20
# -----------------------------------------------------------------
[Config SPECK_6LOWPAN]
description = "6LoWPAN - SPECK"
*.sensor.app[0].messageLength = 108B
*.sensor.udp.procDelay = 0.080ms

[Config ECC_6LOWPAN]
description = "6LoWPAN - ECC"
*.sensor.app[0].messageLength = 172B
*.sensor.udp.procDelay = 2.000ms

[Config ChaCha20]
description = "6LoWPAN - ChaCha20"
*.sensor.app[0].messageLength = 100B
*.sensor.udp.procDelay = 0.060ms

# -----------------------------------------------------------------
# LPWAN Algoritmalari: SPECK, GIFT, SPONGENT
# -----------------------------------------------------------------
[Config SPECK_LPWAN]
description = "LPWAN - SPECK"
*.sensor.app[0].messageLength = 108B
*.sensor.udp.procDelay = 0.080ms
*.sensor.app[0].sendInterval = 2s

[Config GIFT]
description = "LPWAN - GIFT"
*.sensor.app[0].messageLength = 108B
*.sensor.udp.procDelay = 0.070ms
*.sensor.app[0].sendInterval = 2s

[Config SPONGENT]
description = "LPWAN - SPONGENT"
*.sensor.app[0].messageLength = 120B
*.sensor.udp.procDelay = 0.050ms
*.sensor.app[0].sendInterval = 2s

# -----------------------------------------------------------------
# Yuksek Performansli Algoritmalar:
# ML-KEM, ML-DSA, RSA, ECC, SHA-256
# -----------------------------------------------------------------
[Config ML-KEM]
description = "Yuksek Performans - ML-KEM"
*.sensor.app[0].messageLength = 1188B
*.sensor.udp.procDelay = 0.500ms

[Config ML-DSA]
description = "Yuksek Performans - ML-DSA"
*.sensor.app[0].messageLength = 2420B
*.sensor.udp.procDelay = 0.850ms

[Config RSA]
description = "Yuksek Performans - RSA-2048"
*.sensor.app[0].messageLength = 256B
*.sensor.udp.procDelay = 5.000ms

[Config ECC]
description = "Yuksek Performans - ECC"
*.sensor.app[0].messageLength = 172B
*.sensor.udp.procDelay = 2.000ms

[Config SHA-256]
description = "Yuksek Performans - SHA-256"
*.sensor.app[0].messageLength = 132B
*.sensor.udp.procDelay = 0.020ms