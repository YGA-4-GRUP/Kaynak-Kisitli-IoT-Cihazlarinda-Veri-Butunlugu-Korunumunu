[General]
network = simulations.KriptoAgi
sim-time-limit=100s

*.sensor.numApps = 1
*.sensor.app[0].typename = "UdpBasicApp"
*.sensor.app[0].destAddresses = "gateway"
*.sensor.app[0].destPort = 5000
#*.sensor.app[0].messageLength = 100B	#Şifresiz verinin boyutu

#*.sensor.app[0].messageLength = 112B	#AES-128 şifreleme ile verinin boyutu
#*.sensor.udp.procDelay = 0.04172326ms	#AES-128 şifreleme için harcanan ortalama zaman

#*.sensor.app[0].messageLength = 112B	#AES-256 şifreleme ile verinin boyutu
#*.sensor.udp.provDelay=0.0544548ms		#AES-256 şifreleme için harcanan ortalama zaman

*.sensor.app[0].messageLength = 116B	#ChaCha20-Poly1305 şifreleme ile verinin boyutu
*.sensor.udp.provDelay=0.7455349ms		#ChaCha20-poly1305 şifreleme için harcanan ortalama zaman

*.sensor.app[0].sendInterval = 1s

*.gateway.numApps = 1
*.gateway.app[0].typename = "UdpSink"
*.gateway.app[0].localPort = 5000

*.configurator.typename = "Ipv4NetworkConfigurator"

**.wlan[*].mgmt.typename = "Ieee80211MgmtAdhoc"
**.wlan[*].agent.typename = ""