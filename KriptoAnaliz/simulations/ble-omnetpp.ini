[General]
network = simulations.BLEKriptoAgi
sim-time-limit = 100s

*.sensorNode.app[0].sendInterval = 1s	#Veri gönderim sıklığı

#*.sensorNode.app[0].messageLength=100B	#Şifresiz verinin boyutu

*.sensorNode.app[0].messageLength=104B	#SIMON şifreleme ile veri boyutu
*.sensorNode.udp.procDelay=0.2474785ms	#SIMON şifreleme için harcanan ortalam zaman

#*.sensorNode.app[0].messageLength = 116B	#ChaCha20-Poly1305 şifreleme ile verinin boyutu
#*.sensorNode.udp.procDelay=2.1683216ms		#ChaCha20-poly1305 şifreleme için harcanan ortalama zaman

# -- Uygulama Ayarları--
*.sensorNode.numApps = 1
*.sensorNode.app[0].typename = "UdpBasicApp"
*.sensorNode.app[0].destAddresses = "gateway(ipv6)"
*.sensorNode.app[0].destPort = 5000
*.sensorNode.app[0].startTime = 1s

# -- Standart Radyo Ortamı Parametreleri--
*.radioMedium.typename = "Ieee802154ScalarRadioMedium"
*.radioMedium.backgroundNoise.power = -110dBm
*.radioMedium.mediumLimitCache.centerFrequency = 2.4GHz
*.radioMedium.mediumLimitCache.maxTransmissionDuration = 1s 

# --Sinyal Gücü Ayarları--
**.wlan[*].radio.transmitter.power = 2mW
**.wlan[*].radio.receiver.sensitivity = -85dBm

# --Alıcı Ayarları --
*.gateway.numApps = 1
*.gateway.app[0].typename = "UdpSink"
*.gateway.app[0].localPort = 5000

# --BLE ve 6LoWPAN Ayarları --
**.wlan[*].typename = "Ieee802154NarrowbandInterface"
**.wlan[*].mac.typename = "Ieee802154Mac"
**.wlan[*].bitrate = 1Mbps #BLE standart hızı (1-2 Mbps aralığı)
**.wlan[*].hasSixlowpan = true #6LoWPAN sıkıştırma katmanı aktif edilir
**.wlan[*].mac.mtu = 127B #Kriptografik imza sınırı testi için MTU değeri

# --Ağ Yapılandırıcısı--
#6LoWPAN IPv6 paketlerini sıkıştırarak ilettiği için adresleme IPv6 olmalıdır
*.configurator.typename = "Ipv6FlatNetworkConfigurator"
*.*.networkLayer.typename = "Ipv6NetworkLayer"
*.*.hasIpv4 = false		#Cihazların içindeki varsayılan adresleme tipi olan ipv4'ü devre dışı bırakır
*.*.hasIpv6 = true		#Cihazlardaki ipv6 adresleme motorunu aktif hale getirir