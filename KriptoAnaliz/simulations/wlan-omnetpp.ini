[General]
network = simulations.WLANKriptoAgi
sim-time-limit=100s

*.sensor.app[0].sendInterval = 1s 		#Veri gönderim sıklığı

#*.sensorNode.app[0].messageLength = 100B	#Şifresiz verinin boyutu

#*.sensorNode.app[0].messageLength = 112B	#AES-128 şifreleme ile verinin boyutu
#*.sensorNode.udp.procDelay = 0.04172326ms	#AES-128 şifreleme için harcanan ortalama zaman

#*.sensorNode.app[0].messageLength = 112B	#AES-256 şifreleme ile verinin boyutu
#*.sensorNode.udp.procDelay=0.0544548ms		#AES-256 şifreleme için harcanan ortalama zaman

#*.sensorNode.app[0].messageLength = 116B	#ChaCha20-Poly1305 şifreleme ile verinin boyutu
#*.sensorNode.udp.procDelay=0.7455349ms		#ChaCha20-poly1305 şifreleme için harcanan ortalama zaman

#--Uygulama Ayarları
*.sensor.numApps = 1
*.sensor.app[0].typename = "UdpBasicApp"
*.sensor.app[0].destAddresses = "gateway"
*.sensor.app[0].destPort = 5000

#--Alıcı ayarları
*.gateway.numApps = 1
*.gateway.app[0].typename = "UdpSink"
*.gateway.app[0].localPort = 5000

*.configurator.typename = "Ipv4NetworkConfigurator"

**.wlan[*].mgmt.typename = "Ieee80211MgmtAdhoc"
**.wlan[*].agent.typename = ""