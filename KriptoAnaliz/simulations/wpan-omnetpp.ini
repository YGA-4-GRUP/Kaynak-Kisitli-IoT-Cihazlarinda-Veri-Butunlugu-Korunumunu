[General]
network = simulations.WPANKriptoAgi
sim-time-limit = 100s

*.sensorNode.app[0].sendInterval = 1s 		#Veri gönderim sıklığı

#*.sensorNode.app[0].messageLength = 100B 	#Şifresiz veri boyutu

#*.sensorNode.app[0].messageLength = 116B 	#ASCON şifreleme ile verinin boyutu
#*.sensor.udp.procDelay = 0.76022148ms		#ASCON şifrelemesi için harcanan ortalama zaman

*.sensorNode.app[0].messageLength=100B		#ChaCha20 şifreleme ile verinin boyutu
*.sensor.udp.procDelay = 0.04725458			#ChaCha20 şifreleme için harcanan ortalama zaman

#--Uygulama Ayarları--
*.sensorNode.numApps = 1
*.sensorNode.app[0].typename = "UdpBasicApp"
*.sensorNode.app[0].destAddresses = "gateway"
*.sensorNode.app[0].destPort = 5000
*.sensorNode.app[0].startTime = 1s

#--Standart Radyo Ortamı Parametreleri--
*.radioMedium.typename = "Ieee802154ScalarRadioMedium"
*.radioMedium.backgroundNoise.power = -110dBm #Standart arka plan gürültüsü
*.radioMedium.mediumLimitCache.centerFrequency = 2.4GHz #IEEE 802.15.4 çalışma frekansı
*.radioMedium.mediumLimitCache.maxTransmissionDuration = 1s 

#--Sinyal Gücü Ayarları--
**.wlan[*].radio.transmitter.power = 2mW #Standart WPAN iletim gücü
**.wlan[*].radio.receiver.sensitivity = -85dBm #Alıcı hassasiyeti

#--Alıcı Ayarları--
*.gateway.numApps = 1
*.gateway.app[0].typename = "UdpSink"
*.gateway.app[0].localPort = 5000

#--WPAN Ayarları (802.15.4)--
**.wlan[*].typename = "Ieee802154NarrowbandInterface"
**.wlan[*].mac.typename = "Ieee802154Mac"
**.wlan[*].mac.mtu = 127B
**.wlan[*].bitrate = 250kbps

#--Ağ Yapılandırıcısı
*.configurator.typename = "Ipv4NetworkConfigurator"
*.configurator.assignAddress = true
*.configurator.addStaticRoutes = true
*.configurator.config = xml("<config><interface hosts='**' address='10.0.x.x' netmask='255.255.255.0'/></config>")